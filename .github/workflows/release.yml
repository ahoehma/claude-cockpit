name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            outfile: dist/claude-cockpit-linux-x64

          - os: windows-latest
            name: windows-x64
            outfile: dist/claude-cockpit-windows-x64.exe

          - os: macos-latest
            name: macos-arm64
            outfile: dist/claude-cockpit-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2

      - run: npm ci

      - run: OUTFILE=${{ matrix.outfile }} bun run scripts/build-exe.ts
        if: runner.os != 'Windows'

      - run: |
          $env:OUTFILE = "${{ matrix.outfile }}"
          bun run scripts/build-exe.ts
        shell: pwsh
        if: runner.os == 'Windows'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.outfile }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract changelog for this release
        id: changelog
        run: |
          python3 -c "
import re, sys
content = open('CHANGELOG.md').read()
match = re.search(r'(#{1,2} \[.+?)(?=\n#{1,2} \[|\Z)', content, re.DOTALL)
if match:
    sys.stdout.write(match.group(1).strip())
" > /tmp/notes.md
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/linux-x64/claude-cockpit-linux-x64
            dist/windows-x64/claude-cockpit-windows-x64.exe
            dist/macos-arm64/claude-cockpit-macos-arm64
